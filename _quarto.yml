project:
  type: website
  render: 
    - "*.qmd"
    - "!resume.qmd"     # don't build with site settings (otherwise will inherit site scss)
  resources: 
    - "resume.html"     # but copy the built file into _site/
    - "defense_presentation/" # also copy defense slides so the link from resume works
  output-dir: docs

website:
  page-footer: 
    left: "Created with [Quarto](https://quarto.org/) • [License](https://creativecommons.org/licenses/by-nc/4.0/)" 
    center: "Copyright © 2023 Victoria Sass"
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Home
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        menu:
          - text: "SOC 221"
            url: https://vsass.github.io/SOC221
          - text: "CS&SS 508"
            url: https://vsass.github.io/CSSS508
          - text: "Other courses"
            href: teaching.qmd
      - text: "CSSCR Workshops"
        menu: 
          - text: "Text Analysis in R"
            href: workshops/text_analysis.qmd
          - text: "Data Wrangling in R"
            href: workshops/data_wrangling_r.qmd
    tools: 
    - icon: envelope-at
      href: mailto:vsass@uw.edu
    - icon: google
      href: https://scholar.google.com/citations?user=A3lEdiIAAAAJ&hl=en
    - icon: github 
      href: https://github.com/vsass
    - icon: file-person
      href: resume.html

format:
  html:
    theme: 
      - styles.scss 
    grid: 
      sidebar-width: 300px
      body-width: 1000px
    fontsize: 1.1rem
    #css: styles.css
    toc: false
